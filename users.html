<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyManager | Users</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f4f4f4;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      form {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      form input {
        padding: 8px;
        flex: 1;
      }
      form button {
        padding: 8px 15px;
        background: #3498db;
        color: white;
        border: none;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background: #3498db;
        color: white;
      }
      tr:hover {
        background: #f1f1f1;
      }
      .actions button {
        padding: 5px 8px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      .edit {
        background: #2ecc71;
        color: white;
      }
      .delete {
        background: #e74c3c;
        color: white;
      }
      /* Dark mode button */
      #darkModeBtn {
        position: fixed;
        top: 15px;
        right: 20px;
        border: none;
        background: #ddd;
        padding: 8px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        z-index: 999;
      }
      .dark-mode #darkModeBtn {
        background: #333;
        color: white;
      }
      .dark-mode body,
      .dark-mode table,
      .dark-mode th,
      .dark-mode td {
        background: #1a1a1a;
        color: #f0f0f0;
        border-color: #555;
      }
      .dark-mode th {
        background: #333;
      }
      .dark-mode tr:hover {
        background: #222;
      }
    </style>
  </head>
  <body>
    <button id="darkModeBtn">🌙</button>

    <div class="container">
      <h1>Users Management</h1>

      <form id="userForm">
        <input type="hidden" id="userId" />
        <input type="text" id="name" placeholder="Name" required />
        <input type="email" id="email" placeholder="Email" required />
        <input type="text" id="company" placeholder="Company" required />
        <button type="submit">Save User</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>

    <script src="darkmode.js"></script>
    <script src="users.js"></script>
  </body>
</html>
