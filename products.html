<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyManager | Products Management</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="darkmode.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- PROTECTION LOGIN -->
    <script>
      const isLoggedIn = localStorage.getItem("isLoggedIn");
      if (!isLoggedIn || isLoggedIn !== "true") {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("username");
        window.location.replace("login.html");
      }
    </script>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        min-height: 100vh;
        background: #f4f6f8;
        transition: all 0.3s ease;
      }
      .container {
        display: flex;
        width: 100%;
      }
      aside {
        width: 220px;
        background: #2c3e50;
        color: white;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        transition: all 0.3s ease;
      }
      aside .logo {
        text-align: center;
        padding: 20px 0;
        font-size: 1.5em;
        font-weight: 700;
        letter-spacing: 1px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      aside .sidebar {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding-top: 10px;
      }
      aside .sidebar a {
        padding: 12px 20px;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.2s;
        font-weight: 500;
        border-left: 3px solid transparent;
      }
      aside .sidebar a:hover {
        background: rgba(255, 255, 255, 0.1);
        border-left: 3px solid #3498db;
      }
      aside .sidebar a.active {
        background: #34495e;
        border-left: 3px solid #3498db;
      }
      main {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        transition: all 0.3s ease;
      }

      /* 🔝 NAVBAR TOP */
      #topControls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding: 15px 25px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        border: 1px solid #e1e5e9;
      }
      #topControls h1 {
        margin: 0;
        color: #2c3e50;
        font-size: 1.8em;
        font-weight: 600;
      }
      .controls-right {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      .control-btn {
        padding: 9px 18px;
        background: linear-gradient(135deg, #3498db, #2980b9);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .control-btn:hover {
        background: linear-gradient(135deg, #2980b9, #1f6396);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(41, 128, 185, 0.3);
      }
      #languageSwitcher {
        padding: 9px 15px;
        border-radius: 6px;
        border: 1px solid #d1d9e0;
        background: white;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        min-width: 130px;
      }
      #languageSwitcher:hover {
        border-color: #3498db;
        box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.1);
      }
      #darkModeBtn {
        padding: 9px 15px;
        border-radius: 6px;
        border: 1px solid #d1d9e0;
        background: white;
        cursor: pointer;
        font-size: 18px;
        transition: all 0.2s;
        min-width: 50px;
        text-align: center;
      }
      #darkModeBtn:hover {
        border-color: #3498db;
        background: #f8f9fa;
      }

      /* FORM STYLES */
      #productForm {
        width: 100%;
        margin: 0 0 30px 0;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        border: 1px solid #e1e5e9;
      }
      #productForm input {
        padding: 12px 15px;
        border: 1px solid #d1d9e0;
        border-radius: 6px;
        font-size: 15px;
        transition: all 0.2s;
      }
      #productForm input:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
      }
      #productForm button {
        padding: 12px 25px;
        background: linear-gradient(135deg, #4caf50, #45a049);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 15px;
        transition: all 0.2s;
        grid-column: 1 / -1;
      }
      #productForm button:hover {
        background: linear-gradient(135deg, #45a049, #3d8b40);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);
      }

      /* TABLE STYLES */
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 30px;
        border: 1px solid #e1e5e9;
      }
      th,
      td {
        padding: 15px 20px;
        border-bottom: 1px solid #eef1f4;
        text-align: left;
      }
      th {
        background: linear-gradient(135deg, #4caf50, #45a049);
        color: white;
        font-weight: 600;
        font-size: 15px;
      }
      tr:hover {
        background: #f8fafc;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .actions {
        display: flex;
        gap: 10px;
      }
      .actions button {
        border: none;
        padding: 8px 15px;
        cursor: pointer;
        border-radius: 5px;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .edit {
        background: linear-gradient(135deg, #3498db, #2980b9);
        color: white;
      }
      .edit:hover {
        background: linear-gradient(135deg, #2980b9, #1f6396);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
      }
      .delete {
        background: linear-gradient(135deg, #e74c3c, #c0392b);
        color: white;
      }
      .delete:hover {
        background: linear-gradient(135deg, #c0392b, #a93226);
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(231, 76, 60, 0.3);
      }

      /* DARK MODE STYLES */
      .dark-mode {
        background: #121212 !important;
        color: #e0e0e0 !important;
      }
      .dark-mode aside {
        background: #1a1a1a !important;
        border-right: 1px solid #333;
      }
      .dark-mode aside .sidebar a:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .dark-mode aside .sidebar a.active {
        background: #2a2a2a;
      }
      .dark-mode main {
        background: #121212 !important;
      }
      .dark-mode #topControls {
        background: #1e1e1e !important;
        border-color: #333;
        color: #e0e0e0 !important;
      }
      .dark-mode #topControls h1 {
        color: #e0e0e0 !important;
      }
      .dark-mode .control-btn {
        background: linear-gradient(135deg, #444, #333) !important;
        color: #e0e0e0 !important;
        border: 1px solid #444 !important;
      }
      .dark-mode #languageSwitcher,
      .dark-mode #darkModeBtn {
        background: #2a2a2a !important;
        color: #e0e0e0 !important;
        border-color: #444 !important;
      }
      .dark-mode #languageSwitcher option {
        background: #2a2a2a !important;
        color: #e0e0e0 !important;
      }
      .dark-mode #productForm {
        background: #1e1e1e !important;
        border-color: #333 !important;
      }
      .dark-mode #productForm input {
        background: #2a2a2a !important;
        color: #e0e0e0 !important;
        border-color: #444 !important;
      }
      .dark-mode table {
        background: #1e1e1e !important;
        color: #e0e0e0 !important;
        border-color: #333 !important;
      }
      .dark-mode th {
        background: linear-gradient(135deg, #2d7030, #265a28) !important;
      }
      .dark-mode td {
        border-color: #333 !important;
      }
      .dark-mode tr:hover {
        background: #2a2a2a !important;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .container {
          flex-direction: column;
        }
        aside {
          width: 100%;
          min-height: auto;
        }
        #topControls {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }
        .controls-right {
          flex-wrap: wrap;
          justify-content: center;
        }
        #productForm {
          grid-template-columns: 1fr;
        }
        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body data-page="products">
    <div class="container">
      <!-- SIDEBAR -->
      <aside>
        <div class="top">
          <div class="logo">
            B<span style="color: #2980b9">BACKOFFICE</span>
          </div>
        </div>
        <div class="sidebar">
          <a href="index.html"
            ><span>🏠</span> <span data-i18n="dashboard">Dashboard</span></a
          >
          <a href="users.html"
            ><span>👥</span> <span data-i18n="users">Users</span></a
          >
          <a href="products.html" class="active"
            ><span>🛒</span> <span data-i18n="products">Products</span></a
          >
          <a href="stats.html"
            ><span>📊</span> <span data-i18n="statistics">Statistics</span></a
          >
          <a href="clients.html"
            ><span>👤</span> <span data-i18n="clients">Clients</span></a
          >
          <a href="orders.html"
            ><span>📝</span> <span data-i18n="orders">Orders</span></a
          >
          <a href="invoice.html"
            ><span>📄</span> <span data-i18n="invoices">Invoices</span></a
          >
          <a href="#" class="logout" onclick="logout()"
            ><span>🚪</span> <span data-i18n="logout">Logout</span></a
          >
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main>
        <!-- 🔝 NAVBAR TOP -->
        <div id="topControls">
          <h1 data-i18n="productsTitle">Products Management</h1>
          <div class="controls-right">
            <!-- 🌐 Language Selector -->
            <select id="languageSwitcher">
              <option value="fr">🇫🇷 Français</option>
              <option value="en">🇬🇧 English</option>
              <option value="ar">🇸🇦 العربية</option>
            </select>

            <!-- 🌙 Dark Mode -->
            <button id="darkModeBtn">🌙</button>
          </div>
        </div>

        <!-- CREATE / UPDATE FORM -->
        <form id="productForm">
          <input type="hidden" id="productId" />

          <input
            type="text"
            id="name"
            data-i18n-placeholder="productNamePlaceholder"
            placeholder="Enter product name"
            required
          />

          <input
            type="number"
            id="price"
            data-i18n-placeholder="pricePlaceholder"
            placeholder="Enter price"
            required
            min="0"
            step="0.01"
          />

          <input
            type="text"
            id="category"
            data-i18n-placeholder="categoryPlaceholder"
            placeholder="Enter category"
            required
          />

          <button type="submit" data-i18n="saveProduct">Save Product</button>
        </form>

        <!-- PRODUCTS TABLE -->
        <table>
          <thead>
            <tr>
              <th data-i18n="id">ID</th>
              <th data-i18n="productName">Name</th>
              <th data-i18n="category">Category</th>
              <th data-i18n="price">Price ($)</th>
              <th data-i18n="actions">Actions</th>
            </tr>
          </thead>
          <tbody id="productsTable">
            <tr>
              <td
                colspan="5"
                style="text-align: center; padding: 30px"
                data-i18n="loading"
              >
                Loading...
              </td>
            </tr>
          </tbody>
        </table>
      </main>
    </div>

    <!-- SCRIPTS -->
    <script src="i18n.js"></script>
    <script>
      // API URL
      const apiUrl = "http://localhost:3000/api/products";

      // DOM Elements
      const form = document.getElementById("productForm");
      const tbody = document.getElementById("productsTable");
      const productId = document.getElementById("productId");
      const nameInput = document.getElementById("name");
      const priceInput = document.getElementById("price");
      const categoryInput = document.getElementById("category");

      let editMode = false;
      let products = [];

      // Load products from API
      function loadProducts() {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 30px;" data-i18n="loading">Loading...</td></tr>`;

        fetch(apiUrl)
          .then((res) => {
            if (!res.ok) throw new Error("Network response was not ok");
            return res.json();
          })
          .then((data) => {
            products = data;
            renderProducts();
          })
          .catch((error) => {
            console.error("Error loading products:", error);
            tbody.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align: center; color: #e74c3c; padding: 30px;">
                                <i class="fas fa-exclamation-triangle"></i> 
                                <span data-i18n="errorLoading">Error loading products</span>
                            </td>
                        </tr>
                    `;
            // Re-apply translations after error
            if (window.i18n && window.i18n.applyTranslations) {
              window.i18n.applyTranslations();
            }
          });
      }

      // Render products table
      function renderProducts() {
        if (products.length === 0) {
          tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 30px;" data-i18n="noData">
                            No products available
                        </td>
                    </tr>
                `;
          return;
        }

        tbody.innerHTML = "";
        products.forEach((product) => {
          const row = document.createElement("tr");
          row.innerHTML = `
                    <td>${product.id}</td>
                    <td>${escapeHtml(product.name)}</td>
                    <td>${escapeHtml(product.category)}</td>
                    <td>$${parseFloat(product.price).toFixed(2)}</td>
                    <td class="actions">
                        <button class="edit" onclick="editProduct(${
                          product.id
                        })">
                            <i class="fas fa-edit"></i> <span data-i18n="edit">Edit</span>
                        </button>
                        <button class="delete" onclick="deleteProduct(${
                          product.id
                        })">
                            <i class="fas fa-trash"></i> <span data-i18n="delete">Delete</span>
                        </button>
                    </td>
                `;
          tbody.appendChild(row);
        });

        // Re-apply translations after rendering
        if (window.i18n && window.i18n.applyTranslations) {
          window.i18n.applyTranslations();
        }
      }

      // Escape HTML to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Handle form submission
      form.addEventListener("submit", function (e) {
        e.preventDefault();

        // Get form values
        const productData = {
          name: nameInput.value.trim(),
          price: parseFloat(priceInput.value),
          category: categoryInput.value.trim(),
        };

        // Validate
        if (
          !productData.name ||
          isNaN(productData.price) ||
          !productData.category
        ) {
          alert(
            window.i18n
              ? window.i18n.t("fillAllFields")
              : "Please fill all fields"
          );
          return;
        }

        const isEdit = editMode && productId.value;
        const url = isEdit ? `${apiUrl}/${productId.value}` : apiUrl;
        const method = isEdit ? "PUT" : "POST";

        // Send request
        fetch(url, {
          method: method,
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(productData),
        })
          .then((res) => {
            if (!res.ok) throw new Error("Server error");
            return res.json();
          })
          .then(() => {
            // Reset form
            form.reset();
            productId.value = "";
            editMode = false;

            // Reload products
            loadProducts();

            // Show success message
            const message = isEdit ? "itemUpdated" : "itemAdded";
            alert(
              window.i18n
                ? window.i18n.t(message)
                : isEdit
                ? "Product updated successfully"
                : "Product added successfully"
            );
          })
          .catch((error) => {
            console.error("Error saving product:", error);
            alert(
              window.i18n ? window.i18n.t("error") : "Error saving product"
            );
          });
      });

      // Edit product
      window.editProduct = function (id) {
        const product = products.find((p) => p.id == id);
        if (product) {
          productId.value = product.id;
          nameInput.value = product.name;
          priceInput.value = product.price;
          categoryInput.value = product.category;
          editMode = true;

          // Scroll to form
          form.scrollIntoView({ behavior: "smooth" });
          nameInput.focus();
        }
      };

      // Delete product
      window.deleteProduct = function (id) {
        const message = window.i18n
          ? window.i18n.t("confirmDelete")
          : "Are you sure you want to delete this product?";

        if (!confirm(message)) return;

        fetch(`${apiUrl}/${id}`, {
          method: "DELETE",
        })
          .then((res) => {
            if (!res.ok) throw new Error("Server error");
            loadProducts();
            alert(
              window.i18n
                ? window.i18n.t("itemDeleted")
                : "Product deleted successfully"
            );
          })
          .catch((error) => {
            console.error("Error deleting product:", error);
            alert(
              window.i18n ? window.i18n.t("error") : "Error deleting product"
            );
          });
      };

      // Refresh page
      window.refreshPage = function () {
        loadProducts();
      };

      // Logout
      window.logout = function () {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("username");
        window.location.replace("login.html");
      };

      // Initialize dark mode
      document.addEventListener("DOMContentLoaded", function () {
        const darkModeBtn = document.getElementById("darkModeBtn");
        if (darkModeBtn) {
          function updateDarkIcon() {
            darkModeBtn.textContent = document.body.classList.contains(
              "dark-mode"
            )
              ? "☀️"
              : "🌙";
          }

          darkModeBtn.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem(
              "darkMode",
              document.body.classList.contains("dark-mode")
            );
            updateDarkIcon();
          });

          if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark-mode");
          }
          updateDarkIcon();
        }

        // Load products
        loadProducts();
      });
    </script>
  </body>
</html>
